<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dor Dvir — ניהול תיקונים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F2F2F2;
      min-height: 100vh;
    }

    /* ─── Navbar ─── */
    .navbar {
      background: linear-gradient(135deg, #293740 0%, #455159 100%);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(41,55,64,0.2);
    }
    .navbar-brand {
      display: flex;
      flex-direction: column;
    }
    .navbar-brand .name {
      font-size: 17px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.3px;
      line-height: 1;
    }
    .navbar-brand .tag {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 3px;
      font-weight: 400;
    }
    .navbar a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      transition: all 0.15s;
    }
    .navbar a:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* ─── Stats ─── */
    .stats-bar {
      display: flex;
      gap: 14px;
      padding: 24px 32px 8px;
      flex-wrap: wrap;
    }
    .stat-card {
      flex: 1;
      min-width: 120px;
      background: #fff;
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(41,55,64,0.06);
    }
    .stat-card .num {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
      color: #293740;
    }
    .stat-card .lbl { font-size: 12px; color: #B8BCBF; margin-top: 5px; font-weight: 500; }
    .stat-card.waiting .num { color: #d97706; }
    .stat-card.progress .num { color: #2563eb; }
    .stat-card.done    .num { color: #16a34a; }

    /* ─── Filters ─── */
    .filters {
      padding: 16px 32px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid #DDDFE0;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      color: #5D6D73;
    }
    .filter-btn.active,
    .filter-btn:hover { border-color: #293740; color: #293740; font-weight: 600; background: #fff; }

    .search-input {
      padding: 7px 14px;
      border: 1.5px solid #DDDFE0;
      border-radius: 20px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      width: 220px;
      direction: rtl;
      color: #293740;
    }
    .search-input::placeholder { color: #B8BCBF; }
    .search-input:focus { outline: none; border-color: #293740; }

    /* ─── List ─── */
    .list { padding: 8px 32px 48px; }

    .card {
      background: #fff;
      border-radius: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(41,55,64,0.06);
      overflow: hidden;
      transition: box-shadow 0.15s;
      border: 1px solid transparent;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(41,55,64,0.1); }
    .card.open  { border-color: #293740; }

    .card-header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 14px;
      cursor: pointer;
      user-select: none;
    }
    .card-header:hover { background: #FAFAFA; }

    .card-info { flex: 1; min-width: 0; }
    .card-info .name { font-weight: 700; font-size: 15px; color: #293740; }
    .card-info .sub  { font-size: 12px; color: #B8BCBF; margin-top: 3px; font-weight: 400; }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }
    .badge-ממתין  { background: #fef3c7; color: #92400e; }
    .badge-בטיפול { background: #dbeafe; color: #1e40af; }
    .badge-הושלם  { background: #dcfce7; color: #166534; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .rev-count {
      background: #F2F2F2;
      color: #5D6D73;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .date-lbl { font-size: 11px; color: #B8BCBF; }
    .chevron { color: #B8BCBF; font-size: 13px; transition: transform 0.2s; }
    .card.open .chevron { transform: rotate(180deg); }

    /* ─── Card body ─── */
    .card-body {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid #F2F2F2;
    }
    .card.open .card-body { display: block; }

    .rev-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .rev-table th {
      background: #F8F9F9;
      padding: 9px 12px;
      text-align: right;
      font-size: 11px;
      color: #5D6D73;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .rev-table td {
      padding: 11px 12px;
      border-bottom: 1px solid #F2F2F2;
      font-size: 13px;
      color: #293740;
      vertical-align: top;
    }
    .rev-table tr:last-child td { border-bottom: none; }
    .tc { font-family: monospace; color: #455159; direction: ltr; display: inline-block; }

    .notes-box {
      margin-top: 14px;
      padding: 12px 14px;
      background: #FAFAFA;
      border-right: 3px solid #455159;
      border-radius: 8px;
      font-size: 13px;
      color: #455159;
    }
    .notes-box .notes-label {
      font-size: 11px;
      font-weight: 700;
      color: #B8BCBF;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    /* ─── Actions ─── */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .status-select {
      padding: 8px 12px;
      border: 1.5px solid #DDDFE0;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
      direction: rtl;
      color: #293740;
    }
    .status-select:focus { outline: none; border-color: #293740; }

    .btn-save {
      padding: 8px 18px;
      background: #293740;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #1e2c33; }

    .btn-delete {
      padding: 8px 14px;
      background: #FEE2E2;
      color: #b91c1c;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-right: auto;
      transition: all 0.15s;
    }
    .btn-delete:hover { background: #b91c1c; color: #fff; }

    /* ─── Empty ─── */
    .empty-state {
      text-align: center;
      padding: 64px 20px;
      color: #B8BCBF;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 14px; }
    .empty-state p { font-size: 14px; }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #293740;
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media(max-width: 600px) {
      .stats-bar, .filters, .list { padding-right: 16px; padding-left: 16px; }
      .navbar { padding: 0 16px; }
      .card-header { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <div class="name">Dor Dvir</div>
    <div class="tag">ניהול תיקוני סרטונים</div>
  </div>
  <a href="index.html" target="_blank">+ טופס לקוח</a>
</nav>

<!-- Stats -->
<div class="stats-bar" id="statsBar">
  <div class="stat-card total">
    <div class="num" id="s-total">—</div>
    <div class="lbl">סה"כ בקשות</div>
  </div>
  <div class="stat-card waiting">
    <div class="num" id="s-wait">—</div>
    <div class="lbl">ממתינות</div>
  </div>
  <div class="stat-card progress">
    <div class="num" id="s-prog">—</div>
    <div class="lbl">בטיפול</div>
  </div>
  <div class="stat-card done">
    <div class="num" id="s-done">—</div>
    <div class="lbl">הושלמו</div>
  </div>
</div>

<!-- Filters -->
<div class="filters">
  <button class="filter-btn active" data-filter="all">הכל</button>
  <button class="filter-btn" data-filter="ממתין">ממתין</button>
  <button class="filter-btn" data-filter="בטיפול">בטיפול</button>
  <button class="filter-btn" data-filter="הושלם">הושלם</button>
  <input class="search-input" id="searchInput" placeholder="חיפוש לפי שם...">
</div>

<!-- List -->
<div class="list" id="revList">
  <div class="empty-state"><div class="icon">⏳</div><p>טוען...</p></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SITE_ID = 'fixes-dordvir.netlify.app';
  const FORM_NAME = 'revision-request';
  let allRevisions = [];
  let activeFilter = 'all';

  async function loadRevisions() {
    let token = localStorage.getItem('netlify_token');
    if (!token) {
      document.getElementById('revList').innerHTML = `
        <div class="empty-state">
          <div class="icon">🔑</div>
          <p style="margin-bottom:16px">נדרש Personal Access Token של Netlify</p>
          <input id="tokenInput" type="password" placeholder="הכנס טוקן..." style="padding:10px 14px;border:1.5px solid #DDDFE0;border-radius:8px;font-size:14px;width:300px;font-family:Inter,sans-serif;direction:ltr">
          <br><br>
          <button onclick="saveToken()" style="padding:10px 24px;background:#293740;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif">התחבר</button>
          <br><br>
          <a href="https://app.netlify.com/user/applications/personal" target="_blank" style="font-size:12px;color:#5D6D73">צור טוקן כאן ←</a>
        </div>`;
      return;
    }
    try {
      const formsRes = await fetch(`https://api.netlify.com/api/v1/sites/${SITE_ID}/forms`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!formsRes.ok) { localStorage.removeItem('netlify_token'); loadRevisions(); return; }
      const forms = await formsRes.json();
      const form = forms.find(f => f.name === FORM_NAME);
      if (!form) { allRevisions = []; renderStats(); renderList(); return; }

      const subRes = await fetch(`https://api.netlify.com/api/v1/forms/${form.id}/submissions?per_page=100`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const submissions = await subRes.json();

      allRevisions = submissions.map(s => {
        const savedStatus = localStorage.getItem(`status-${s.id}`) || 'ממתין';
        let revisions = [];
        try { revisions = JSON.parse(s.data.revisions || '[]'); } catch { revisions = []; }
        return {
          id: s.id,
          clientName: s.data['client-name'] || 'לא ידוע',
          clientEmail: s.data['client-email'] || '',
          videoName: s.data['video-name'] || '',
          revisions: Array.isArray(revisions) ? revisions : [],
          notes: s.data.notes || '',
          status: savedStatus,
          createdAt: s.created_at
        };
      });
      renderStats();
      renderList();
    } catch {
      document.getElementById('revList').innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div><p>שגיאה בטעינה — נסה לרענן</p></div>';
    }
  }

  function saveToken() {
    const t = document.getElementById('tokenInput').value.trim();
    if (!t) return;
    localStorage.setItem('netlify_token', t);
    loadRevisions();
  }

  function renderStats() {
    document.getElementById('s-total').textContent = allRevisions.length;
    document.getElementById('s-wait').textContent  = allRevisions.filter(r => r.status === 'ממתין').length;
    document.getElementById('s-prog').textContent  = allRevisions.filter(r => r.status === 'בטיפול').length;
    document.getElementById('s-done').textContent  = allRevisions.filter(r => r.status === 'הושלם').length;
  }

  function renderList() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let data = allRevisions;
    if (activeFilter !== 'all') data = data.filter(r => r.status === activeFilter);
    if (q) data = data.filter(r =>
      r.clientName.toLowerCase().includes(q) ||
      (r.videoName || '').toLowerCase().includes(q)
    );

    const container = document.getElementById('revList');
    if (!data.length) {
      container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>אין בקשות להציג</p></div>';
      return;
    }
    container.innerHTML = data.map(r => buildCard(r)).join('');
  }

  function buildCard(r) {
    const date = new Date(r.createdAt).toLocaleDateString('he-IL', {
      day: '2-digit', month: '2-digit', year: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
    const revRows = r.revisions.map((rev, i) =>
      `<tr>
        <td>${i + 1}</td>
        <td>${rev.timecode ? `<span class="tc">${rev.timecode}</span>` : '—'}</td>
        <td>${rev.description}</td>
      </tr>`
    ).join('');

    return `
    <div class="card" id="card-${r.id}">
      <div class="card-header" onclick="toggleCard('${r.id}')">
        <div class="card-info">
          <div class="name">${r.clientName}</div>
          <div class="sub">${r.videoName || ''}${r.clientEmail ? ' · ' + r.clientEmail : ''}</div>
        </div>
        <div class="card-meta">
          <span class="badge badge-${r.status}">${r.status}</span>
          <span class="rev-count">${r.revisions.length} תיקונים</span>
          <span class="date-lbl">${date}</span>
          <span class="chevron">▾</span>
        </div>
      </div>
      <div class="card-body">
        <table class="rev-table">
          <thead><tr>
            <th style="width:36px">#</th>
            <th style="width:110px">טיים-קוד</th>
            <th>תיאור</th>
          </tr></thead>
          <tbody>${revRows}</tbody>
        </table>

        ${r.notes ? `
        <div class="notes-box">
          <div class="notes-label">הערות</div>
          ${r.notes}
        </div>` : ''}

        <div class="actions">
          <button class="btn-delete" onclick="deleteRevision('${r.id}')">מחק</button>
          <select class="status-select" id="sel-${r.id}">
            <option ${r.status === 'ממתין'  ? 'selected' : ''}>ממתין</option>
            <option ${r.status === 'בטיפול' ? 'selected' : ''}>בטיפול</option>
            <option ${r.status === 'הושלם'  ? 'selected' : ''}>הושלם</option>
          </select>
          <button class="btn-save" onclick="updateStatus('${r.id}')">שמור סטטוס</button>
        </div>
      </div>
    </div>`;
  }

  function toggleCard(id) {
    document.getElementById(`card-${id}`).classList.toggle('open');
  }

  async function updateStatus(id) {
    const status = document.getElementById(`sel-${id}`).value;
    localStorage.setItem(`status-${id}`, status);
    const r = allRevisions.find(x => x.id === id);
    if (r) r.status = status;
    renderStats();
    renderList();
    showToast('סטטוס עודכן ✓');
  }

  async function deleteRevision(id) {
    if (!confirm('האם למחוק בקשה זו?')) return;
    const token = localStorage.getItem('netlify_token');
    try {
      await fetch(`https://api.netlify.com/api/v1/submissions/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
    } catch {}
    localStorage.removeItem(`status-${id}`);
    allRevisions = allRevisions.filter(r => r.id !== id);
    renderStats();
    renderList();
    showToast('הבקשה נמחקה');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderList();
    });
  });

  document.getElementById('searchInput').addEventListener('input', renderList);

  loadRevisions();
  setInterval(loadRevisions, 30000);
</script>
</body>
</html>
